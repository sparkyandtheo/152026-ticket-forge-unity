# netlify.toml

[build]
  publish = "public"
  functions = "functions"

# The "SPA" Redirect Rule
# This ensures that if a user reloads the app on /views/mobile, 
# it doesn't 404, but lets index.html handle the routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache Control for static assets (Images/CSS) - 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache Control for Service Worker - 0 seconds (Always check for updates)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Security Headers (CSP)
[[headers]]
  for = "/*"
  [headers.values]
    # UPDATED: Added https://*.google-analytics.com and data: to the allowed list
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://*.firebaseio.com https://*.googletagmanager.com https://*.google-analytics.com https://apis.google.com wss://*.firebaseio.com;"