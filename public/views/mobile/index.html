<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechView | Job List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/brand.css">
    <style>
        :root { --dark: #231F20; --light: #f8f9fa; --blue: #0047BB; --brand: #EF3340; --green: #1e8e3e; --red: #d93025; --yellow: #f9ab00; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark); color: white; margin: 0; padding-bottom: 40px; -webkit-tap-highlight-color: transparent; }

        /* HEADER */
        .app-header { padding: 16px 20px; background: #3c4043; border-bottom: 3px solid var(--brand); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .app-header .brand-mark { width: 28px; height: 28px; border-radius: 6px; margin-right: 8px; vertical-align: middle; }
        .tech-name { font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .logout-btn { background: transparent; border: 1px solid #9aa0a6; color: #9aa0a6; padding: 5px 10px; border-radius: 4px; font-size: 11px; }

        /* ROLE SWITCHER (mobile) */
        .role-dropdown { position: relative; display: inline-block; }
        .role-dropdown > button { background: transparent; border: 1px solid #9aa0a6; color: #9aa0a6; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; font-family: 'Inter', sans-serif; cursor: pointer; }
        .role-dropdown-content { display: none; position: absolute; right: 0; background-color: #303134; min-width: 180px; box-shadow: 0 8px 16px 0 rgba(0,0,0,0.5); z-index: 200; border-radius: 6px; border: 1px solid #5f6368; overflow: hidden; }
        .role-dropdown-content a { color: #e8eaed; padding: 14px 16px; text-decoration: none; display: block; font-size: 14px; font-family: 'Inter', sans-serif; border-bottom: 1px solid #3c4043; }
        .role-dropdown-content a:active, .role-dropdown-content a:hover { background-color: var(--blue); color: white; }
        .role-dropdown.open .role-dropdown-content { display: block; }

        /* Impersonation pill */
        .viewas-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(239,51,64,0.15); border: 1px solid var(--brand);
            color: #ff9ea6; padding: 4px 10px; border-radius: 20px;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; cursor: pointer; font-family: inherit;
        }
        .viewas-pill:hover { background: rgba(239,51,64,0.25); color: white; }
        .viewas-banner {
            background: var(--brand); color: white;
            padding: 8px 14px; font-size: 11px; text-align: center;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
            font-family: 'Inter', sans-serif;
        }

        /* JOB LIST VIEW */
        .job-list { padding: 15px; }
        .job-card { background: #303134; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--blue); cursor: pointer; transition: transform 0.1s; }
        .job-card:active { transform: scale(0.98); background: #444; }
        .card-time { color: var(--yellow); font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin-bottom: 5px; font-weight: bold; }
        .card-addr { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .card-cust { color: #bdc1c6; font-size: 14px; }

        /* JOB DETAIL VIEW (Hidden by default) */
        #detail-view { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--dark); z-index: 100; overflow-y: auto; }
        .detail-header { background: #3c4043; padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; }
        .back-btn { background: transparent; border: none; color: white; font-size: 24px; cursor: pointer; }
        
        .big-action-btn { background: #525659; border: none; border-radius: 12px; color: white; padding: 15px; font-size: 16px; font-weight: bold; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-map { background: var(--blue); }
        .btn-call { background: var(--green); }

        .section { padding: 20px; border-bottom: 1px solid #3c4043; }
        .section-label { color: var(--yellow); font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .data-box { background: #303134; padding: 15px; border-radius: 8px; font-size: 16px; line-height: 1.4; color: #e8eaed; }

        /* INPUTS */
        textarea { width: 100%; background: #202124; border: 2px solid #5f6368; color: white; font-size: 16px; padding: 15px; border-radius: 8px; box-sizing: border-box; min-height: 120px; margin-bottom: 10px; font-family: sans-serif; }
        textarea:focus { border-color: var(--blue); outline: none; }
        
        /* FOOTER ACTIONS */
        .footer-actions { padding: 20px; }
        .finish-btn { background: var(--yellow); color: black; border: none; width: 100%; padding: 18px; border-radius: 50px; font-size: 18px; font-weight: 900; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* EMPTY STATE */
        .empty-state { text-align: center; color: #9aa0a6; margin-top: 50px; }
        .loader { border: 3px solid #3c4043; border-top: 3px solid var(--blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="list-view">
        <div id="viewas-banner" class="viewas-banner" style="display:none;"></div>
        <div class="app-header">
            <div class="tech-name" style="display:flex; align-items:center;"><img src="/assets/img/icon-192.png" alt="" class="brand-mark"><span id="header-user">LOADING...</span></div>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap: wrap; justify-content: flex-end;" id="mobile-toolbar-right">
                <div class="role-dropdown" id="viewas-dd">
                    <button class="viewas-pill" onclick="document.getElementById('viewas-dd').classList.toggle('open')">👁️ View as ▼</button>
                    <div class="role-dropdown-content" id="viewas-list" style="min-width: 220px;">
                        <div style="padding:14px 16px; color:#9aa0a6; font-size:11px;">Loading techs…</div>
                    </div>
                </div>
                <div class="role-dropdown" id="role-dd">
                    <button onclick="document.getElementById('role-dd').classList.toggle('open')">🛠️ TECH ▼</button>
                    <div class="role-dropdown-content">
                        <a href="/views/forms/dashboard.html">👤 Dashboard (Docs)</a>
                        <a href="/views/office/dispatch.html">🗓️ Dispatcher (Board)</a>
                        <a href="/views/mobile/index.html">🛠️ Field Tech (Mobile)</a>
                        <a href="/views/customers/index.html">👥 Customers</a>
                        <a href="/views/office/admin.html">🛡️ Admin Console</a>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">LOGOUT</button>
            </div>
        </div>
        <div class="job-list" id="job-container">
            <div class="loader"></div>
        </div>
    </div>

    <div id="detail-view">
        <div class="detail-header">
            <button class="back-btn" onclick="closeJob()">←</button>
            <div style="font-weight:bold; font-size:14px;">JOB DETAILS</div>
        </div>
        
        <div class="section">
            <div id="d-address" class="card-addr"></div>
            <div id="d-cust" class="card-cust"></div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                <button class="big-action-btn btn-map" id="btn-nav">🗺️ NAVIGATE</button>
                <button class="big-action-btn btn-call" id="btn-dial">📞 CALL</button>
            </div>
        </div>

        <div class="section">
            <div class="section-label">SCOPE OF WORK</div>
            <div class="data-box" id="d-scope"></div>
        </div>

        <div class="section">
            <div class="section-label">TECH NOTES</div>
            <textarea id="d-notes" placeholder="Type resolution notes here..."></textarea>
            
            <div class="section-label">SIGNATURE (TYPE NAME)</div>
            <input type="text" id="d-sig" placeholder="Technician Name" style="width:100%; padding:15px; background:#202124; border:1px solid #5f6368; color:white; border-radius:8px;">
        </div>

        <div class="footer-actions">
            <button class="finish-btn" onclick="finishJob()">COMPLETE JOB</button>
        </div>
    </div>

    <script type="module">
        import { db, auth } from '/js/firebase-config.js';
        import { DB } from '/js/db.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentTechName = "Guest";   // the tech whose jobs are displayed
        let realUser = null;             // the actual signed-in Firebase user (for audit)
        let impersonating = false;       // true if currentTechName !== real user's email prefix
        let openJobId = null;
        let openCollection = null;
        let activeListeners = [];

        // 1. AUTH CHECK
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/index.html';
                return;
            }
            realUser = user;

            // Default: view as yourself. Override via ?as=<name> URL param.
            const params = new URLSearchParams(window.location.search);
            const override = params.get('as');
            const selfName = (user.email || '').split('@')[0];
            currentTechName = override || selfName;
            impersonating = !!override && override.toLowerCase() !== selfName.toLowerCase();

            updateHeader();
            await populateViewAsList();
            loadJobs(currentTechName);
        });

        function updateHeader() {
            document.getElementById('header-user').innerText = currentTechName.toUpperCase();
            const banner = document.getElementById('viewas-banner');
            if (impersonating) {
                banner.style.display = 'block';
                banner.innerHTML = `👁️ Viewing as <b>${currentTechName.toUpperCase()}</b> — signed in as ${realUser.email}`;
            } else {
                banner.style.display = 'none';
            }
        }

        // Populate "View as" dropdown from employees collection.
        async function populateViewAsList() {
            const list = document.getElementById('viewas-list');
            try {
                const employees = (await DB.getAll('employees'))
                    .filter(e => ['service','install','sales'].includes(e.role))
                    .sort((a, b) => (a.name || '').localeCompare(b.name || ''));

                const selfName = (realUser.email || '').split('@')[0];
                let html = `<a href="?" style="border-left: 4px solid transparent;">👤 Myself (${selfName})</a>`;
                if (employees.length === 0) {
                    html += `<div style="padding:14px 16px; color:#9aa0a6; font-size:11px;">No techs yet. Add them in <a href="/admin" style="color:#1a73e8;">Admin</a>.</div>`;
                } else {
                    for (const emp of employees) {
                        const isActive = emp.name === currentTechName;
                        const color =
                            emp.role === 'service' ? '#1a73e8' :
                            emp.role === 'install' ? '#9c27b0' :
                            '#f9ab00';
                        html += `<a href="?as=${encodeURIComponent(emp.name)}"
                            style="border-left: 4px solid ${color}; ${isActive ? 'background:#1a73e8; color:white;' : ''}">
                            ${emp.name} <span style="font-size:10px; opacity:.7;">(${emp.role})</span>
                        </a>`;
                    }
                }
                list.innerHTML = html;
            } catch (e) {
                console.warn('[viewas] could not load employees:', e);
                list.innerHTML = `<div style="padding:14px 16px; color:#9aa0a6; font-size:11px;">Could not load tech list.</div>`;
            }
        }

        window.logout = () => signOut(auth);

        // Mount notification bell + universal search in the mobile toolbar
        import('/js/notification-bell.js').then(m => {
            m.mountNotificationBell(document.getElementById('mobile-toolbar-right'));
        }).catch(e => console.warn('[bell] mount failed:', e));
        import('/js/universal-search.js').then(m => {
            m.mountUniversalSearch(document.getElementById('mobile-toolbar-right'));
        }).catch(e => console.warn('[search] mount failed:', e));

        // 2. LOAD JOBS
        function loadJobs(techName) {
            // NOTE: In production, match this string exactly to what Dispatch Board saves
            // We search both Collections: Service Tickets AND Work Orders
            
            const container = document.getElementById('job-container');
            container.innerHTML = ''; // Clear loader

            // A. Service Tickets
            subscribeToCollection('service_tickets', techName, container);
            
            // B. Work Orders
            subscribeToCollection('work_orders', techName, container);
        }

        function subscribeToCollection(colName, techName, container) {
            // Query: Status=Scheduled AND assignedTech matches
            // Note: Since our Dispatch Board saves "Mario", but login might be "mario@...", 
            // you might need to adjust this matching logic. 
            // For this demo, we assume strict match or we fetch ALL scheduled for demo purposes.
            
            const q = query(collection(db, colName), where("status", "==", "Scheduled"));

            onSnapshot(q, (snapshot) => {
                // We filter client-side for "loose" name matching to handle "Mario" vs "mario"
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const assigned = (data.assignedTech || "").toLowerCase();
                    const current = techName.toLowerCase();

                    // Show if assigned to me OR if I'm the admin testing it
                    if (assigned.includes(current) || current === 'admin') {
                        renderCard(doc.id, data, colName, container);
                    }
                });
                
                if(container.innerHTML === '') {
                    container.innerHTML = `<div class="empty-state">No jobs scheduled for <b>${techName}</b> today.</div>`;
                }
            });
        }

        function renderCard(id, data, col, container) {
            // Avoid duplicates if both listeners fire
            if(document.getElementById(`card-${id}`)) return;

            const div = document.createElement('div');
            div.className = 'job-card';
            div.id = `card-${id}`;
            div.innerHTML = `
                <div class="card-time">⏰ ${data.scheduledSlot || 'TODAY'}</div>
                <div class="card-addr">${data.address || data.siteAddress || 'No Address'}</div>
                <div class="card-cust">${data.customerName || 'Unknown Client'}</div>
            `;
            
            div.onclick = () => openJob(id, data, col);
            container.appendChild(div);
        }

        // 3. JOB DETAIL LOGIC
        function openJob(id, data, col) {
            openJobId = id;
            openCollection = col;

            // Fill Data
            document.getElementById('d-address').innerText = data.address || data.siteAddress || '';
            document.getElementById('d-cust').innerText = data.customerName || '';
            document.getElementById('d-scope').innerText = data.description || 'See paper ticket for details.';
            document.getElementById('d-notes').value = data.techNotes || ''; // Pre-fill if existing
            
            // Buttons
            const addr = data.address || data.siteAddress || '';
            document.getElementById('btn-nav').onclick = () => window.open(`https://maps.google.com/?q=${encodeURIComponent(addr)}`);
            document.getElementById('btn-dial').onclick = () => window.location.href = `tel:${data.phone || ''}`;

            // Show View
            document.getElementById('detail-view').style.display = 'block';
        }

        window.closeJob = () => {
            document.getElementById('detail-view').style.display = 'none';
            openJobId = null;
        }

        // 4. FINISH JOB
        window.finishJob = async () => {
            if(!confirm("Mark this job as COMPLETE?")) return;

            const notes = document.getElementById('d-notes').value;
            const sig = document.getElementById('d-sig').value;

            if(!sig) { alert("Please sign (type) your name."); return; }

            const payload = {
                status: "Complete",
                techNotes: notes,
                techSig: sig,
                completedAt: serverTimestamp(),
                // Audit: record WHO actually signed off on this, regardless of
                // which tech the UI is "viewing as".
                completedByEmail: realUser ? realUser.email : null,
                viewingAs: currentTechName
            };
            if (impersonating) payload.impersonated = true;

            try {
                await updateDoc(doc(db, openCollection, openJobId), payload);
                alert("Good job! Synced to office.");
                closeJob();
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    </script>
    <!-- PWA install banner (iOS/Android install prompt, mobile only) -->
    <script src="/js/pwa-install-banner.js" defer></script>
</body>
</html>
