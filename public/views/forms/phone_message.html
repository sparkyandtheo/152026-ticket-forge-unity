<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phone Message - Hamburg Overhead Door</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/forms.css">
    
    <style>
        /* Specific Styles for Phone Message Actions */
        .action-row { margin-top: 20px; display: flex; gap: 20px; padding-top: 20px; border-top: 2px dashed #ddd; }
        .action-btn { flex: 1; padding: 15px; border: 2px solid #ddd; background: #f8f9fa; border-radius: 8px; cursor: pointer; text-align: left; transition: all 0.2s; }
        .action-btn:hover { border-color: #1a73e8; background: #e8f0fe; }
        .action-title { font-weight: bold; font-size: 14px; color: #1a73e8; display: block; margin-bottom: 5px; }
        .action-desc { font-size: 10px; color: #666; }
        .footer-note { font-size: 10px; color: #999; text-align: center; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn btn-gray" onclick="location.href='dashboard.html'" style="margin-right: auto; margin-left: 20px;">← Dashboard</button>
    <button class="btn btn-blue" onclick="window.print()">Print</button>
    <button class="btn btn-red" onclick="if(confirm('Clear form?')) location.reload();">Clear Form</button>
</div>

<div class="page">
    <div class="header-row">
        <div>
            <b style="font-size: 16px;">HAMBURG OVERHEAD DOOR, INC.</b><br>
            5659 Herman Hill Road, Hamburg, NY 14075<br>
            716-649-3600 | www.hamburgdoor.com
        </div>
        
        <div style="text-align: right; width: 340px;">
            <div style="font-size: 20px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; white-space: nowrap;">
                === PHONE MESSAGE ===
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-bottom:5px;">
                <b class="label">REF #:</b> 
                <input type="text" id="msg-id" value="MSG-NEW" style="width: 15ch; text-align:right;">
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <span class="label">DATE:</span> 
                <input type="text" value="" id="date-field" style="width: 15ch; text-align:right;">
            </div>
        </div>
    </div>

    <div class="double-divider"></div>

    <div style="display: flex; justify-content: space-between; gap: 20px;">
        <div style="width: 50%;">
            <b>CUSTOMER / CALLER:</b><br>
            <input type="text" id="cust-name" placeholder="NAME"><br>
            <input type="text" id="cust-addr1" placeholder="ADDRESS LINE 1"><br>
            <input type="text" id="cust-addr2" placeholder="CITY, STATE ZIP"><br>
            
            <div style="display:flex; margin-top:5px;">
                <span class="label" style="align-self:center;">PH:</span> 
                <div class="input-group">
                    <input type="text" id="cust-phone" placeholder="PHONE (TYPE TO SEARCH...)" autocomplete="off">
                    <div id="suggestions-phone" class="suggestions-box"></div>
                </div>
            </div>
            
            <button class="btn btn-save" style="font-size: 9px; padding: 4px; margin-top:5px; width:100%;" onclick="doUpdateRolodex()">
                UPDATE ROLODEX
            </button>
        </div>
        
        <div style="width: 50%;">
            <b>JOB LOCATION:</b><br>
            <input type="text" id="site-addr1" placeholder="JOB ADDRESS LINE 1"><br>
            <input type="text" id="site-addr2" placeholder="CITY, STATE ZIP"><br>
            <div style="display:flex; margin-top:5px;">
                <span class="label">ACCT ID:</span> 
                <input type="text" id="cust-id" placeholder="CUSTOMER ID">
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <b class="label">MESSAGE / NOTES:</b>
    <textarea id="intake-notes" rows="18" style="margin-top: 10px; border: 1px dashed #eee; padding: 10px;" placeholder="ENTER MESSAGE DETAILS HERE..."></textarea>

    <div class="mt-auto">
        <div class="action-row">
            <button class="action-btn" onclick="convertToIntake('service')">
                <span class="action-title">🛠 CREATE SERVICE TICKET</span>
                <span class="action-desc">Transfer info to Service Ticket Form</span>
            </button>
            <button class="action-btn" onclick="convertToIntake('sales')">
                <span class="action-title">💼 CREATE SALES LEAD</span>
                <span class="action-desc">Transfer info to Sales Call Form</span>
            </button>
        </div>
        
        <div class="footer-note">
            PHONE MESSAGE / INTAKE RECORD - INTERNAL USE ONLY
        </div>
    </div>
</div>

<script type="module">
    import { DB } from '../../js/db.js';
    // 2. IMPORT SHARED UTILS
    import { getUrlParam, setVal, setupInputHighlighting, setupRolodex, updateRolodexFromFields } from '../../js/form-utils.js';

    const DOC_ID = getUrlParam('id');

    window.onload = async () => {
        // Shared visual logic (highlights inputs, auto-grows textareas)
        setupInputHighlighting();

        // Auto-set Date
        const today = new Date();
        document.getElementById('date-field').value = (today.getMonth()+1)+'/'+today.getDate()+'/'+today.getFullYear();
        
        // Setup Rolodex Logic (One-liner now!)
        setupRolodex('cust-phone', 'suggestions-phone', (client) => {
            setVal('cust-name', client.name);
            setVal('cust-addr1', client.address1);
            setVal('cust-addr2', client.address2);
            setVal('cust-phone', client.phone);
            setVal('cust-id', client.id);
        });

        if(DOC_ID) {
            console.log("Loading Message...", DOC_ID);
            const data = await DB.getDoc('phone_messages', DOC_ID);
            if(data) loadForm(data);
        }
    };

    // Wrapper for shared Rolodex update
    window.doUpdateRolodex = () => updateRolodexFromFields({
        name: 'cust-name', 
        phone: 'cust-phone', 
        addr1: 'cust-addr1', 
        addr2: 'cust-addr2', 
        acctId: 'cust-id'
    });

    function loadForm(data) {
        setVal('cust-name', data.customerName);
        setVal('cust-phone', data.phone);
        setVal('cust-addr1', data.address1);
        setVal('cust-addr2', data.address2);
        setVal('site-addr1', data.siteAddress1);
        setVal('site-addr2', data.siteAddress2);
        setVal('intake-notes', data.notes);
        
        // Trigger highlight for existing data
        setTimeout(() => document.querySelectorAll('input, textarea').forEach(el => {
            if(el.value) el.classList.add('input-changed');
        }), 100);
    }

    // 3. CONVERSION LOGIC (Kept specific to this form)
    window.convertToIntake = async function(targetType) {
        // A. Gather Data
        const payload = {
            customerName: document.getElementById('cust-name').value,
            phone: document.getElementById('cust-phone').value,
            address1: document.getElementById('cust-addr1').value,
            address2: document.getElementById('cust-addr2').value,
            siteAddress1: document.getElementById('site-addr1').value,
            siteAddress2: document.getElementById('site-addr2').value,
            description: document.getElementById('intake-notes').value,
            origin: 'phone_message',
            status: 'Open'
        };

        // B. Save Customer to Rolodex first (Background)
        if(payload.phone && payload.customerName) {
            DB.saveCustomer({
                name: payload.customerName,
                phone: payload.phone,
                address1: payload.address1,
                address2: payload.address2
            });
        }

        // C. Create the Target Document
        try {
            let collection = targetType === 'service' ? 'service_tickets' : 'sales_leads';
            const newId = await DB.saveDoc(collection, payload);
            
            // D. Redirect to the new form
            if (targetType === 'service') {
                window.location.href = `service.html?id=${newId}`;
            } else {
                window.location.href = `sales_call.html?id=${newId}`; 
            }
        } catch (e) {
            console.error(e);
            alert("Error creating ticket: " + e.message);
        }
    };
</script>
</body>
</html>
