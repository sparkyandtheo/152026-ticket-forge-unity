<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phone Message - Hamburg Overhead Door</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL VARIABLES & RESET --- */
        :root { --page-width: 8.5in; --page-height: 11in; }

        body { 
            background: #525659; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 80px 0 40px 0; 
            margin: 0; 
            font-family: sans-serif; 
        }

        /* --- TOOLBAR LAYOUT (Absolute Center) --- */
        .toolbar { 
            position: fixed; top: 0; left: 0; right: 0; height: 60px; 
            background: #202124; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; 
            z-index: 1000; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.4); 
            position: relative; /* Needed for absolute centering */
        }
        
        .tb-left { z-index: 2; }
        .tb-right { z-index: 2; display: flex; gap: 10px; }

        /* Dead Center Positioning */
        .tb-center { 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 8px; /* Tighter gap to keep buttons closer */
            z-index: 1;
        }

        /* --- BUTTONS --- */
        .btn { padding: 8px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; font-size: 11px; text-transform: uppercase; color: white; transition: all 0.2s; white-space: nowrap; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn-blue { background: #1a73e8; } 
        .btn-green { background: #1e8e3e; } 
        .btn-gray { background: #5f6368; } 
        .btn-red { background: #d93025; } 
        .btn-orange { background: #e37400; }
        .btn-save { background: #f9ab00; color: #000; }
        
        .btn-rolodex {
            width: 100%; margin-top: 8px; padding: 8px;
            font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 10px;
            text-transform: uppercase; background: #f9ab00; color: #000;
            border: 1px solid #e37400; cursor: pointer;
        }

        /* --- PAGE SHEET --- */
        .page { 
            background: white; width: var(--page-width); min-height: var(--page-height); 
            padding: 0.5in; box-shadow: 0 0 15px rgba(0,0,0,0.3); 
            font-family: 'IBM Plex Mono', monospace; font-size: 12px; 
            display: flex; flex-direction: column; box-sizing: border-box; position: relative; 
        }

        /* --- UTILITIES --- */
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .double-divider { border-top: 3px double #000; border-bottom: 1px solid #000; height: 1px; margin: 10px 0; }
        .divider { border-top: 1px solid #000; margin: 10px 0; }
        .mt-auto { margin-top: auto; }
        .label { font-weight: 600; white-space: nowrap; margin-right: 5px; }

        /* --- INPUTS --- */
        input, textarea { 
            font-family: 'IBM Plex Mono', monospace; font-size: 12px; 
            border: 1px solid #ddd; border-bottom: 2px solid #ccc; outline: none; 
            text-transform: uppercase; color: #000; width: 100%; 
            transition: all 0.2s; background: #ffffcc; padding: 4px; 
        }
        input:hover, textarea:hover { background: #e6fffa; border-color: #1e8e3e; cursor: text; }
        input:focus, textarea:focus { border-bottom: 2px solid #d500f9; background: #ffccff; font-weight: 600; }
        .input-changed { background-color: #e3f2fd !important; border-color: #2196F3 !important; border-bottom: 2px solid #2196F3 !important; }
        textarea { resize: none; overflow: hidden; display: block; line-height: 1.3; }

        /* --- ROLODEX DROPDOWN --- */
        .input-group { position: relative; display:flex; width: 100%; }
        .suggestions-box { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; z-index: 1000; max-height: 150px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 11px; }
        .suggestion-item:hover { background-color: #f0f8ff; color: #1a73e8; }

        /* --- FOOTER NOTE --- */
        .footer-note { font-size: 10px; color: #999; text-align: center; margin-top: 20px; font-style: italic; }

        /* --- PRINT MEDIA --- */
        @media print {
            .toolbar, .btn-rolodex { display: none !important; }
            body { background: white; padding: 0; margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .page { margin: 0; box-shadow: none; border: none; width: 100%; height: auto; padding: 0; overflow: visible; }
            input, textarea { background: transparent !important; border: none !important; border-bottom: 1px solid #ccc !important; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="tb-left">
        <button class="btn btn-gray" onclick="location.href='dashboard.html'">← Dash</button>
    </div>
    
    <div class="tb-center">
        <button class="btn btn-blue" onclick="convertToIntake('service')">🛠 Start Service Ticket</button>
        <button class="btn btn-green" onclick="convertToIntake('sales')">💼 Start Sales Call</button>
        <button class="btn btn-orange" onclick="convertToIntake('quote')">📝 Start Quote</button>
    </div>
    
    <div class="tb-right">
        <button class="btn btn-gray" onclick="window.print()">Print</button>
        <button class="btn btn-red" onclick="if(confirm('Clear form?')) location.reload();">Clear</button>
    </div>
</div>

<div class="page">
    <div class="header-row">
        <div>
            <b style="font-size: 16px;">HAMBURG OVERHEAD DOOR, INC.</b><br>
            5659 Herman Hill Road, Hamburg, NY 14075<br>
            716-649-3600 | www.hamburgdoor.com
        </div>
        
        <div style="text-align: right; width: 340px;">
            <div style="font-size: 20px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; white-space: nowrap;">
                === PHONE MESSAGE ===
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-bottom:5px;">
                <b class="label">REF #:</b> 
                <input type="text" id="msg-id" value="MSG-NEW" style="width: 15ch; text-align:right;">
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <span class="label">DATE:</span> 
                <input type="text" value="" id="date-field" style="width: 15ch; text-align:right;">
            </div>
        </div>
    </div>

    <div class="double-divider"></div>

    <div style="display: flex; justify-content: space-between; gap: 20px;">
        <div style="width: 50%;">
            <b>CUSTOMER / CALLER:</b><br>
            <input type="text" id="cust-name" placeholder="NAME"><br>
            <input type="text" id="cust-addr1" placeholder="ADDRESS LINE 1"><br>
            <input type="text" id="cust-addr2" placeholder="CITY, STATE ZIP"><br>
            
            <div style="display:flex; margin-top:5px;">
                <span class="label" style="align-self:center;">PH:</span> 
                <div class="input-group">
                    <input type="text" id="cust-phone" placeholder="PHONE (TYPE TO SEARCH...)" autocomplete="off">
                    <div id="suggestions-phone" class="suggestions-box"></div>
                </div>
            </div>
            
            <button class="btn-rolodex" onclick="doUpdateRolodex()">UPDATE ROLODEX</button>
        </div>
        
        <div style="width: 50%;">
            <b>JOB LOCATION:</b><br>
            <input type="text" id="site-addr1" placeholder="JOB ADDRESS LINE 1"><br>
            <input type="text" id="site-addr2" placeholder="CITY, STATE ZIP"><br>
            <div style="display:flex; margin-top:5px;">
                <span class="label">ACCT ID:</span> 
                <input type="text" id="cust-id" placeholder="CUSTOMER ID">
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <b class="label">MESSAGE / NOTES:</b>
    <textarea id="intake-notes" rows="18" style="margin-top: 10px; border: 1px dashed #eee; padding: 10px;" placeholder="ENTER MESSAGE DETAILS HERE..."></textarea>

    <div class="mt-auto">
        <div class="footer-note">
            PHONE MESSAGE / INTAKE RECORD - INTERNAL USE ONLY
        </div>
    </div>
</div>

<script type="module">
    import { DB } from '../../js/db.js';
    import { getUrlParam, setVal, setupInputHighlighting, setupRolodex, updateRolodexFromFields } from '../../js/form-utils.js';

    const DOC_ID = getUrlParam('id');

    window.onload = async () => {
        setupInputHighlighting();

        const today = new Date();
        document.getElementById('date-field').value = (today.getMonth()+1)+'/'+today.getDate()+'/'+today.getFullYear();
        
        setupRolodex('cust-phone', 'suggestions-phone', (client) => {
            setVal('cust-name', client.name);
            setVal('cust-addr1', client.address1);
            setVal('cust-addr2', client.address2);
            setVal('cust-phone', client.phone);
            setVal('cust-id', client.id);
        });

        if(DOC_ID) {
            console.log("Loading Message...", DOC_ID);
            const data = await DB.getDoc('phone_messages', DOC_ID);
            if(data) loadForm(data);
        }
    };

    window.doUpdateRolodex = () => updateRolodexFromFields({
        name: 'cust-name', phone: 'cust-phone', addr1: 'cust-addr1', addr2: 'cust-addr2', acctId: 'cust-id'
    });

    function loadForm(data) {
        setVal('cust-name', data.customerName);
        setVal('cust-phone', data.phone);
        setVal('cust-addr1', data.address1);
        setVal('cust-addr2', data.address2);
        setVal('site-addr1', data.siteAddress1);
        setVal('site-addr2', data.siteAddress2);
        setVal('intake-notes', data.notes);
        
        setTimeout(() => document.querySelectorAll('input, textarea').forEach(el => {
            if(el.value) el.classList.add('input-changed');
        }), 100);
    }

    // --- CONVERT LOGIC ---
    window.convertToIntake = async function(targetType) {
        // A. Gather Data
        const payload = {
            customerName: document.getElementById('cust-name').value,
            phone: document.getElementById('cust-phone').value,
            address1: document.getElementById('cust-addr1').value,
            address2: document.getElementById('cust-addr2').value,
            siteAddress1: document.getElementById('site-addr1').value,
            siteAddress2: document.getElementById('site-addr2').value,
            description: document.getElementById('intake-notes').value,
            origin: 'phone_message',
            status: 'Open'
        };

        // B. Save Customer
        if(payload.phone && payload.customerName) {
            DB.saveCustomer({
                name: payload.customerName,
                phone: payload.phone,
                address1: payload.address1,
                address2: payload.address2
            });
        }

        // C. Create Target
        try {
            let collection, page;
            
            if (targetType === 'service') {
                collection = 'service_tickets';
                page = 'service.html';
            } else if (targetType === 'sales') {
                collection = 'sales_leads';
                page = 'sales_call.html';
            } else if (targetType === 'quote') {
                collection = 'quotes';
                page = 'quote.html';
            }

            const newId = await DB.saveDoc(collection, payload);
            window.location.href = `${page}?id=${newId}`;
            
        } catch (e) {
            console.error(e);
            alert("Error creating document: " + e.message);
        }
    };
</script>
</body>
</html>
