<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' 'unsafe-inline' 'unsafe-eval' data: 
        https://*.googleapis.com 
        https://*.gstatic.com 
        https://*.firebaseapp.com 
        https://*.firebaseio.com 
        https://*.googletagmanager.com
        https://*.google-analytics.com 
        https://apis.google.com 
        wss://*.firebaseio.com;
    ">

    <title>Hamburg Door | Staff Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #202124; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; margin: 0; color: white; }
        .login-card { background: #303134; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; }
        .logo { font-weight: 900; font-size: 24px; margin-bottom: 30px; letter-spacing: -1px; }
        
        .btn-google {
            display: flex; align-items: center; justify-content: center;
            background: white; color: #5f6368; width: 100%;
            padding: 12px; border-radius: 4px; border: none;
            font-weight: 600; font-size: 16px; cursor: pointer;
            transition: background 0.2s; gap: 10px;
        }
        .btn-google:hover { background: #f1f3f4; }
        .error { color: #d93025; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">HAMBURG DOOR</div>
        
        <button class="btn-google" onclick="handleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Sign in with Google
        </button>

        <div id="error-msg" class="error">Login Failed</div>
    </div>

    <script type="module">
        // UPDATE: Changed './js/auth.js' to '/js/auth.js' (Absolute Path)
        import { AuthService } from '/js/auth.js';

        window.handleLogin = async () => {
            const errorDiv = document.getElementById('error-msg');
            try {
                await AuthService.loginWithGoogle();
                // If successful, auth.js listener redirects us. 
                // We just save the role preference here.
                localStorage.setItem('user_role', 'office'); 
            } catch (error) {
                console.error(error);
                errorDiv.style.display = 'block';
                errorDiv.innerText = "Error: " + error.message;
            }
        };
    </script>
</body>
</html>
